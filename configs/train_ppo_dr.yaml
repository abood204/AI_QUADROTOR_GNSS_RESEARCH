# PPO training with domain randomization enabled
# Depth noise + spawn position randomization for generalization

env:
  ip: ""
  image_shape: [84, 84, 1]
  target_alt: 3.0
  max_vx: 3.0
  max_vy: 1.0
  max_yaw_rate_deg: 45
  dt: 0.1
  max_steps: 1024
  depth_clip_m: 20.0

reward:
  w_progress: 0.5
  w_collision: -100.0
  w_smoothness: -0.1

domain_randomization:
  enabled: true
  depth_noise_std: 0.02       # ~5% Gaussian noise on normalized depth
  spawn_radius_m: 5.0         # Random spawn within 5m of origin

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 500000

frame_stack: 4

output:
  log_dir: "logs/ppo"
  checkpoint_dir: "models/rl"
  checkpoint_freq: 10000
  eval_freq: 5000
  eval_episodes: 5
