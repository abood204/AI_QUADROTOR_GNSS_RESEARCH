# PPO Training Config — Optimized for 4-hour sessions
# Usage: python -m src.training.train --config configs/train_ppo_fast.yaml
#
# Differences from train_ppo.yaml:
#   n_steps:          2048 -> 1024  (faster updates in collision-heavy early phase)
#   total_timesteps:  1M   -> 500K  (achievable in 3-4 sessions at 10 FPS)
#   eval_freq:        5000 -> 10000 (reduce eval overhead)
#   eval_episodes:    5    -> 3     (faster eval)

env:
  ip: ""                    # AirSim IP (empty = localhost)
  image_shape: [84, 84, 1] # Depth image dimensions (H, W, C)
  target_alt: 3.0           # Altitude hold in meters (NED: sent as -3.0)
  max_vx: 3.0               # Max forward velocity (m/s)
  max_vy: 1.0               # Max lateral velocity (m/s)
  max_yaw_rate_deg: 45       # Max yaw rate (deg/s)
  dt: 0.1                   # Control loop period (10 Hz)
  max_steps: 1024           # Steps before truncation

reward:
  w_progress: 0.5           # Weight for forward velocity reward
  w_collision: -100.0       # Penalty on collision (terminal)
  w_smoothness: -0.1        # Penalty for action jerk ||a_t - a_{t-1}||

ppo:
  learning_rate: 3.0e-4
  n_steps: 1024             # Steps per rollout before update (faster updates)
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 500000

frame_stack: 4               # Temporal frame stacking

output:
  log_dir: "logs/ppo"
  checkpoint_dir: "models/rl"
  checkpoint_freq: 10000     # Save every N steps
  eval_freq: 10000           # Evaluate every N steps (reduced from 5K)
  eval_episodes: 3           # Episodes per evaluation (reduced from 5)
